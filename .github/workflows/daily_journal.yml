name: 期刊文献每日推送

on:
  schedule:
    # UTC 22:00 = 北京时间次日 06:00
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "推送模式（latest=最新3篇 / daily=每天3篇追溯 / both=合并）"
        required: false
        default: "both"
      issn:
        description: "期刊 ISSN（默认 Cities: 0264-2751）"
        required: false
        default: "0264-2751"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run journal tracker
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          JOURNAL_NAME: "Cities"
        run: |
          python journal_tracker.py "${{ github.event.inputs.mode || 'both' }}" "${{ github.event.inputs.issn || '0264-2751' }}"
